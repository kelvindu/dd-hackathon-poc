---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: datadog-agent
  labels:
    app: datadog-agent
spec:
  selector:
    matchLabels:
      app: datadog-agent
  template:
    metadata:
      labels:
        app: datadog-agent
    spec:
      containers:
        - name: agent
          image: gcr.io/datadoghq/agent:7
          ports:
            - name: apm
              containerPort: 8126
              protocol: TCP
            - name: dogstatsd
              containerPort: 8125
              protocol: UDP
          env:
            - name: DD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: datadog-secret
                  key: api-key
            - name: DD_SITE
              value: "datadoghq.com"
            # Log collection
            - name: DD_LOGS_ENABLED
              value: "true"
            - name: DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL
              value: "true"
            - name: DD_CONTAINER_EXCLUDE
              value: "name:datadog-agent"
            # APM
            - name: DD_APM_ENABLED
              value: "true"
            - name: DD_APM_NON_LOCAL_TRAFFIC
              value: "true"
            # Prometheus autodiscovery for faulty-workload /metrics
            - name: DD_PROMETHEUS_SCRAPE_ENABLED
              value: "true"
            - name: DD_PROMETHEUS_SCRAPE_CHECKS
              value: >-
                [{"autodiscovery":{"kubernetes_container_names":["faulty-workload"]},
                  "configurations":[{"prometheus_url":"http://%%host%%:8080/metrics",
                    "namespace":"faulty_workload",
                    "metrics":["request_count_total","error_count_total",
                               "warning_count_total","timeout_count_total",
                               "latency_ms_bucket","latency_ms_count"]}]}]
            - name: DD_DOGSTATSD_NON_LOCAL_TRAFFIC
              value: "true"
            # Kubernetes metadata
            - name: DD_KUBERNETES_KUBELET_NODENAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: dockersock
              mountPath: /var/run/docker.sock
              readOnly: true
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: cgroup
              mountPath: /host/sys/fs/cgroup
              readOnly: true
      volumes:
        - name: dockersock
          hostPath:
            path: /var/run/docker.sock
        - name: proc
          hostPath:
            path: /proc
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
