---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: faulty-workload
  labels:
    app: faulty-workload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: faulty-workload
  template:
    metadata:
      labels:
        app: faulty-workload
    spec:
      containers:
        - name: faulty-workload
          image: faulty-workload:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "faulty-workload"
            # Probability of injecting a hard HTTP 500 error (5%)
            - name: FAULT_RATE
              value: "0.05"
            # Inject a latency spike every N requests
            - name: LATENCY_SPIKE_INTERVAL
              value: "20"
            # Simulate a dependency timeout every N requests
            - name: TIMEOUT_INTERVAL
              value: "50"
            # Fraction of non-fault requests to log (reduce CloudWatch volume)
            - name: FAULT_SAMPLE_RATE
              value: "0.1"
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: faulty-workload
  labels:
    app: faulty-workload
spec:
  type: ClusterIP
  selector:
    app: faulty-workload
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
