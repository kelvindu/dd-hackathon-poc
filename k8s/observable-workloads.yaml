---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customers-workload
  labels:
    app: customers-workload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customers-workload
  template:
    metadata:
      labels:
        app: customers-workload
    spec:
      containers:
        - name: customers-workload
          image: faulty-workload:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "customers-workload"
            - name: WORKLOAD_FAMILY
              value: "customers"
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_SERVICE
              value: "customers-workload"
            - name: DD_ENV
              value: "production"
            - name: DD_VERSION
              value: "0.1.0"
            - name: FAULT_SAMPLE_RATE
              value: "0.1"
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: customers-workload
  labels:
    app: customers-workload
spec:
  type: ClusterIP
  selector:
    app: customers-workload
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
