---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: analyzer
  labels:
    app: analyzer
  annotations:
    # IRSA: bind this ServiceAccount to the IAM role that grants
    # CloudWatch Logs/Metrics read access and Bedrock InvokeModel access.
    # Replace ACCOUNT_ID with your AWS account ID before deploying.
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/poc-analyzer-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyzer
  labels:
    app: analyzer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analyzer
  template:
    metadata:
      labels:
        app: analyzer
    spec:
      serviceAccountName: analyzer
      containers:
        - name: analyzer
          image: analyzer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "analyzer"
            # CloudWatch log group that the faulty-workload ships to
            - name: LOG_GROUP
              value: "/poc/faulty-workload"
            # CloudWatch EMF metric namespace used by the faulty-workload
            - name: METRIC_NAMESPACE
              value: "POC/FaultyWorkload"
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: analyzer
  labels:
    app: analyzer
spec:
  type: ClusterIP
  selector:
    app: analyzer
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
