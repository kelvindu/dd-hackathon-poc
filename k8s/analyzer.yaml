---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: analyzer
  labels:
    app: analyzer
  annotations:
    # IRSA: bind this ServiceAccount to the IAM role that grants
    # Bedrock InvokeModel access.
    # Replace ACCOUNT_ID with your AWS account ID before deploying.
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/poc-analyzer-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyzer
  labels:
    app: analyzer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analyzer
  template:
    metadata:
      labels:
        app: analyzer
    spec:
      serviceAccountName: analyzer
      containers:
        - name: analyzer
          image: analyzer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "analyzer"
            # Bedrock model configuration — override via ConfigMap or Secret as needed
            - name: BEDROCK_MODEL_ID
              value: "anthropic.claude-3-haiku-20240307-v1:0"
            - name: BEDROCK_MAX_TOKENS
              value: "512"
            # Datadog MCP — HTTP transport pointing to in-cluster MCP service
            - name: DD_MCP_TRANSPORT
              value: "http"
            - name: DD_MCP_URL
              value: "http://datadog-mcp:3000"
            # Datadog Agent / APM
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_TRACE_ENABLED
              value: "true"
            - name: DD_SERVICE
              value: "analyzer"
            - name: DD_ENV
              value: "production"
            # Datadog API key for LLM Observability
            - name: DD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: datadog-secret
                  key: api-key
                  optional: true
            - name: DD_SITE
              value: "datadoghq.com"
            # Datadog LLM Observability — agent mode
            - name: DD_LLMOBS_ENABLED
              value: "true"
            - name: DD_LLMOBS_ML_APP
              value: "datadogllm-poc"
            - name: DD_LLMOBS_AGENTLESS_ENABLED
              value: "false"
            # AWS account ID used in IRSA annotations — set via Secret/ConfigMap
            # - name: AWS_ACCOUNT_ID
            #   valueFrom:
            #     secretKeyRef:
            #       name: aws-account
            #       key: account_id
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: analyzer
  labels:
    app: analyzer
spec:
  type: ClusterIP
  selector:
    app: analyzer
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
